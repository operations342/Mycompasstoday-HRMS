services:
  - type: web
    name: mycompass-mwms
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:jzCoWWzvAmU8Cr0ZSt9DV3sr92g3alqWCeQN6DTsMeI=
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: mycompass-db
          property: connectionString

databases:
  - name: mycompass-db
    plan: free
